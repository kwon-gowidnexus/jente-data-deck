name: Cash Command Auto Update

on:
  schedule:
    # 매일 KST 06:05 = UTC 21:05 (전날)
    - cron: '5 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-httplib2 google-api-python-client google-cloud-bigquery

      - name: Run updater
        env:
          GOWID_ADC_JSON: ${{ secrets.GOWID_ADC_JSON }}
          SHEETS_ADC_JSON: ${{ secrets.SHEETS_ADC_JSON }}
        run: |
          python scripts/cash_command_updater.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cash.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: Cash Command data update $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi
